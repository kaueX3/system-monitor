<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEALDADE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
            z-index: -1;
            animation: rotateBG 30s linear infinite;
        }
        @keyframes rotateBG {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .login-container {
            background: rgba(10, 10, 10, 0.8);
            border-radius: 16px;
            padding: 50px 45px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .login-container:hover {
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 25px rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .logo p {
            color: #888888;
            font-size: 0.85em;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #aaaaaa;
            font-weight: 500;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group input {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.1em;
            transition: all 0.3s ease;
            border-radius: 0;
        }
        .form-group input:focus {
            outline: none;
            border-bottom-color: #ffffff;
            box-shadow: 0 1px 0 #ffffff;
        }
        .form-group input::placeholder {
            color: #444444;
        }
        .login-btn {
            width: 100%;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #ffffff;
            border-radius: 8px;
            color: #000000;
            font-size: 1em;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 20px;
            text-transform: uppercase;
        }
        .login-btn:hover {
            background: transparent;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        .login-btn:active {
            transform: translateY(1px);
        }
        .message {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .message p {
            color: #666666;
            font-style: normal;
            font-size: 0.8em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .error {
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-weight: 500;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        .success {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-weight: 500;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .loading {
            animation: blink 1.5s infinite;
            pointer-events: none;
            background: transparent;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>LEALDADE</h1>
            <p>Painel de Controle</p>
        </div>
        
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                ENTRAR
            </button>
        </form>
        
        <div class="message">
            <p>Se você chegou até aqui, tem um longo caminho a seguir...</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            loginBtn.classList.add('loading');
            loginBtn.textContent = 'VERIFICANDO...';
            loginBtn.disabled = true;
            
            setTimeout(() => {
                if (username === 'lealdade' && password === 'lealdade') {
                    successMsg.textContent = 'ACESSO PERMITIDO. REDIRECIONANDO...';
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);
                } else {
                    errorMsg.textContent = 'ACESSO NEGADO.';
                    errorMsg.style.display = 'block';
                    
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = 'ENTRAR';
                    loginBtn.disabled = false;
                    
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 1500);
        });
        
        document.getElementById('username').addEventListener('input', function() {
            if (this.value.length > 0) {
                this.style.borderBottomColor = '#ffffff';
            } else {
                this.style.borderBottomColor = 'rgba(255,255,255,0.2)';
            }
        });
        
        document.getElementById('password').addEventListener('input', function() {
            if (this.value.length > 0) {
                this.style.borderBottomColor = '#ffffff';
            } else {
                this.style.borderBottomColor = 'rgba(255,255,255,0.2)';
            }
        });
    </script>
</body>
</html>
