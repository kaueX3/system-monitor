<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Negado - LEALDADE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            user-select: none;
        }
        
        .warning-container {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 50px;
            max-width: 500px;
            text-align: center;
            position: relative;
            animation: warningPulse 2s infinite;
        }
        
        @keyframes warningPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.1); }
        }
        
        .warning-title {
            font-size: 2em;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        .warning-message {
            font-size: 1.1em;
            color: #aaaaaa;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .warning-details {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 20px;
            margin-top: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .warning-details p {
            color: #888888;
            margin-bottom: 10px;
            font-size: 0.9em;
            font-family: monospace;
        }
        
        .redirect-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 1em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .redirect-btn:hover {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
        }
    </style>
</head>
<body>
    <div class="warning-container">
        <h1 class="warning-title">ACESSO NEGADO</h1>
        <p class="warning-message">Tentativa de acesso não autorizado bloqueada.</p>
        
        <div class="warning-details">
            <p> IP: {{ client_ip }}</p>
            <p> User-Agent: {{ user_agent }}</p>
            <p> Timestamp: {{ timestamp }}</p>
        </div>
        
        <button class="redirect-btn" onclick="window.location.href='/'">RETORNAR</button>
    </div>
</body>
</html>
